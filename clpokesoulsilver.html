<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NDS Emulator</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #game {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

<div id="game"></div>

<script>
  EJS_player = "#game";

  // Nintendo DS
  EJS_core = "nds";

  // YOUR NETLIFY ROM URL
  EJS_gameUrl = "https://files.catbox.moe/2p9uip.nds";

  // EmulatorJS CDN
  EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

  // Optional settings
  EJS_startOnLoaded = true;
  EJS_gameName = "My NDS Game";
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
